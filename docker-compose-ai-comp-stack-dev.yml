# docker-compose.yml
# Complete Digital Company Stack - local/dev blueprint
# Components:
# - Traefik: reverse proxy
# - PocketBase: operational registry
# - Gitea: Git/code hosting
# - Coolify: deployment platform placeholder/service
# - Taiga: project/work management
# - ERPNext: CRM/HR/Finance via Frappe
# - n8n: automation/orchestration
# - Mautic: marketing automation / drip campaigns
# - Listmonk: newsletters / bulk email
# - Matomo: website analytics
# - PostHog: product analytics + session replay
# - Mattermost: internal chat/alerts
# - Mailpit: local email testing
#
# IMPORTANT:
# 1. This is a unified local/dev blueprint. Some apps, especially ERPNext, Taiga,
#    Coolify, and PostHog, often require extra official init/config steps.
# 2. For production, split this into multiple compose files and move secrets to
#    .env, Docker secrets, or a vault.
# 3. StackAdapt is external SaaS, so it is NOT a container here. Integrate it via n8n/API.

version: "3.9"

networks:
  company_net:
    driver: bridge

volumes:
  # Registry / DevOps / PM / Automation
  pocketbase_data:
  gitea_data:
  taiga_db_data:
  taiga_media:
  n8n_db_data:
  n8n_data:

  # ERPNext
  erpnext_mariadb_data:
  erpnext_redis_data:
  erpnext_sites:
  erpnext_logs:

  # Email marketing
  mautic_db_data:
  mautic_data:
  listmonk_db_data:
  listmonk_uploads:

  # Analytics
  matomo_db_data:
  matomo_data:
  posthog_db_data:
  posthog_redis_data:
  posthog_clickhouse_data:
  posthog_data:

  # Chat / alerts
  mattermost_db_data:
  mattermost_config:
  mattermost_data:
  mattermost_logs:
  mattermost_plugins:
  mattermost_client_plugins:
  mattermost_bleve_indexes:

  # Optional shared/ops
  traefik_letsencrypt:

services:
  # ==========================================================
  # EDGE / REVERSE PROXY
  # ==========================================================
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      # For production HTTPS, uncomment and configure certificates/ACME.
      # - --entrypoints.websecure.address=:443
      # - --certificatesresolvers.letsencrypt.acme.email=admin@example.com
      # - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      # - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      # - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "8080:8080"
      # - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - company_net

  # ==========================================================
  # POCKETBASE - OPERATIONAL REGISTRY / LIGHT CONTROL PLANE
  # URL: http://registry.localhost
  # ==========================================================
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pocketbase
    restart: unless-stopped
    volumes:
      - pocketbase_data:/pb_data
    labels:
      - traefik.enable=true
      - traefik.http.routers.pocketbase.rule=Host(`registry.localhost`)
      - traefik.http.routers.pocketbase.entrypoints=web
      - traefik.http.services.pocketbase.loadbalancer.server.port=8090
    networks:
      - company_net

  # ==========================================================
  # GITEA - GIT / CODE / INFRA REPOSITORIES
  # URL: http://git.localhost
  # SSH: localhost:2222
  # ==========================================================
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__server__DOMAIN: git.localhost
      GITEA__server__ROOT_URL: http://git.localhost/
      GITEA__server__SSH_DOMAIN: git.localhost
      GITEA__server__SSH_PORT: 2222
      GITEA__server__START_SSH_SERVER: "true"
    ports:
      - "2222:22"
      - "3000:3000"
    volumes:
      - gitea_data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.gitea.rule=Host(`git.localhost`)
      - traefik.http.routers.gitea.entrypoints=web
      - traefik.http.services.gitea.loadbalancer.server.port=3000
    networks:
      - company_net

  # ==========================================================
  # COOLIFY - DEPLOYMENT PLATFORM
  # URL: http://deploy.localhost
  # NOTE:
  # Coolify's official deployment often uses its own installer and extra services.
  # This service is included as a placeholder/dev entry. For serious use,
  # install Coolify using its official recommended installer on the target host.
  # ==========================================================
  coolify:
    image: ghcr.io/coollabsio/coolify:latest
    container_name: coolify
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./coolify:/data/coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.coolify.rule=Host(`deploy.localhost`)
      - traefik.http.routers.coolify.entrypoints=web
      - traefik.http.services.coolify.loadbalancer.server.port=8000
    networks:
      - company_net

  # ==========================================================
  # TAIGA - PROJECT / WORK MANAGEMENT
  # URL: http://pm.localhost
  # NOTE:
  # Official Taiga deployments normally include front, back, async, events, protected,
  # and gateway services. This is a simplified placeholder. For full production,
  # use Taiga's official Docker Compose stack and connect it to this network.
  # ==========================================================
  taiga_db:
    image: postgres:16
    container_name: taiga_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: taiga
      POSTGRES_USER: taiga
      POSTGRES_PASSWORD: taiga_password_change_me
    volumes:
      - taiga_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taiga -d taiga"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - company_net

  taiga:
    image: taigaio/taiga-back:latest
    container_name: taiga
    restart: unless-stopped
    depends_on:
      taiga_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://taiga:taiga_password_change_me@taiga_db:5432/taiga
      TAIGA_SECRET_KEY: taiga_secret_change_me
      TAIGA_SITES_SCHEME: http
      TAIGA_SITES_DOMAIN: pm.localhost
    volumes:
      - taiga_media:/taiga-back/media
    labels:
      - traefik.enable=true
      - traefik.http.routers.taiga.rule=Host(`pm.localhost`)
      - traefik.http.routers.taiga.entrypoints=web
      - traefik.http.services.taiga.loadbalancer.server.port=8000
    networks:
      - company_net

  # ==========================================================
  # n8n - ORCHESTRATOR / AUTOMATION MANAGER
  # URL: http://flow.localhost
  # ==========================================================
  n8n_db:
    image: postgres:16
    container_name: n8n_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n_password_change_me
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - company_net

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    depends_on:
      n8n_db:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n_db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8n_password_change_me
      N8N_HOST: flow.localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://flow.localhost/
      NODE_ENV: production
      GENERIC_TIMEZONE: America/Moncton
      N8N_ENCRYPTION_KEY: replace_with_32_plus_char_random_key
      N8N_SECURE_COOKIE: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.rule=Host(`flow.localhost`)
      - traefik.http.routers.n8n.entrypoints=web
      - traefik.http.services.n8n.loadbalancer.server.port=5678
    networks:
      - company_net

  # ==========================================================
  # ERPNext / Frappe - CRM / HR / FINANCE / ADMIN
  # URL: http://erp.localhost
  # NOTE:
  # ERPNext usually needs setup jobs: configurator, create-site, workers, scheduler,
  # websocket, queue workers, and frontend/backend split. This is a compact blueprint.
  # For production, use official frappe_docker compose and attach it to company_net.
  # ==========================================================
  erpnext_mariadb:
    image: mariadb:10.6
    container_name: erpnext_mariadb
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: erp_root_password_change_me
    volumes:
      - erpnext_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-perp_root_password_change_me"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - company_net

  erpnext_redis:
    image: redis:7-alpine
    container_name: erpnext_redis
    restart: unless-stopped
    volumes:
      - erpnext_redis_data:/data
    networks:
      - company_net

  erpnext_configurator:
    image: frappe/erpnext:version-15
    container_name: erpnext_configurator
    restart: "no"
    depends_on:
      erpnext_mariadb:
        condition: service_healthy
      erpnext_redis:
        condition: service_started
    entrypoint: bash -c
    command: >
      "ls -1 apps > sites/apps.txt &&
      bench set-config -g db_host erpnext_mariadb &&
      bench set-config -gp db_port 3306 &&
      bench set-config -g redis_cache redis://erpnext_redis:6379 &&
      bench set-config -g redis_queue redis://erpnext_redis:6379 &&
      bench set-config -g redis_socketio redis://erpnext_redis:6379 &&
      bench set-config -g socketio_port 9000"
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - company_net

  erpnext_create_site:
    image: frappe/erpnext:version-15
    container_name: erpnext_create_site
    restart: "no"
    depends_on:
      erpnext_configurator:
        condition: service_completed_successfully
    entrypoint: bash -c
    command: >
      "bench new-site erp.localhost
      --mariadb-root-password erp_root_password_change_me
      --admin-password admin_change_me
      --no-mariadb-socket || true &&
      bench --site erp.localhost install-app erpnext || true"
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    networks:
      - company_net

  erpnext:
    image: frappe/erpnext:version-15
    container_name: erpnext
    restart: unless-stopped
    depends_on:
      erpnext_mariadb:
        condition: service_healthy
      erpnext_redis:
        condition: service_started
      erpnext_create_site:
        condition: service_completed_successfully
    environment:
      FRAPPE_SITE_NAME_HEADER: erp.localhost
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    labels:
      - traefik.enable=true
      - traefik.http.routers.erpnext.rule=Host(`erp.localhost`)
      - traefik.http.routers.erpnext.entrypoints=web
      - traefik.http.services.erpnext.loadbalancer.server.port=8080
    networks:
      - company_net

  # ==========================================================
  # MAUTIC - MARKETING AUTOMATION / DRIP / LEAD SCORING
  # URL: http://mautic.localhost
  # ==========================================================
  mautic_db:
    image: mariadb:10.11
    container_name: mautic_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mautic
      MYSQL_USER: mautic
      MYSQL_PASSWORD: mautic_password_change_me
      MYSQL_ROOT_PASSWORD: mautic_root_password_change_me
    volumes:
      - mautic_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmautic_root_password_change_me"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - company_net

  mautic:
    image: mautic/mautic:latest
    container_name: mautic
    restart: unless-stopped
    depends_on:
      mautic_db:
        condition: service_healthy
    environment:
      MAUTIC_DB_HOST: mautic_db
      MAUTIC_DB_NAME: mautic
      MAUTIC_DB_USER: mautic
      MAUTIC_DB_PASSWORD: mautic_password_change_me
      MAUTIC_RUN_CRON_JOBS: "true"
      MAUTIC_TRUSTED_PROXIES: 0.0.0.0/0
      MAUTIC_URL: http://mautic.localhost
    volumes:
      - mautic_data:/var/www/html
    labels:
      - traefik.enable=true
      - traefik.http.routers.mautic.rule=Host(`mautic.localhost`)
      - traefik.http.routers.mautic.entrypoints=web
      - traefik.http.services.mautic.loadbalancer.server.port=80
    networks:
      - company_net

  # ==========================================================
  # LISTMONK - NEWSLETTER / BULK EMAIL
  # URL: http://listmonk.localhost
  # ==========================================================
  listmonk_db:
    image: postgres:16
    container_name: listmonk_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: listmonk
      POSTGRES_USER: listmonk
      POSTGRES_PASSWORD: listmonk_password_change_me
    volumes:
      - listmonk_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk -d listmonk"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - company_net

  listmonk:
    image: listmonk/listmonk:latest
    container_name: listmonk
    restart: unless-stopped
    depends_on:
      listmonk_db:
        condition: service_healthy
    command: ["sh", "-c", "./listmonk --install --idempotent && ./listmonk"]
    environment:
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_app__admin_username: admin
      LISTMONK_app__admin_password: admin_change_me
      LISTMONK_db__host: listmonk_db
      LISTMONK_db__port: 5432
      LISTMONK_db__user: listmonk
      LISTMONK_db__password: listmonk_password_change_me
      LISTMONK_db__database: listmonk
      LISTMONK_db__ssl_mode: disable
    volumes:
      - listmonk_uploads:/listmonk/uploads
    labels:
      - traefik.enable=true
      - traefik.http.routers.listmonk.rule=Host(`listmonk.localhost`)
      - traefik.http.routers.listmonk.entrypoints=web
      - traefik.http.services.listmonk.loadbalancer.server.port=9000
    networks:
      - company_net

  # ==========================================================
  # MATOMO - WEBSITE ANALYTICS / GA ALTERNATIVE
  # URL: http://analytics.localhost
  # ==========================================================
  matomo_db:
    image: mariadb:10.11
    container_name: matomo_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: matomo_root_password_change_me
      MYSQL_DATABASE: matomo
      MYSQL_USER: matomo
      MYSQL_PASSWORD: matomo_password_change_me
    volumes:
      - matomo_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmatomo_root_password_change_me"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - company_net

  matomo:
    image: matomo:latest
    container_name: matomo
    restart: unless-stopped
    depends_on:
      matomo_db:
        condition: service_healthy
    environment:
      MATOMO_DATABASE_HOST: matomo_db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: matomo_password_change_me
      MATOMO_DATABASE_DBNAME: matomo
    volumes:
      - matomo_data:/var/www/html
    labels:
      - traefik.enable=true
      - traefik.http.routers.matomo.rule=Host(`analytics.localhost`)
      - traefik.http.routers.matomo.entrypoints=web
      - traefik.http.services.matomo.loadbalancer.server.port=80
    networks:
      - company_net

  # ==========================================================
  # POSTHOG - PRODUCT ANALYTICS / FUNNELS / SESSION REPLAY
  # URL: http://posthog.localhost
  # NOTE:
  # PostHog self-hosting is heavy and official deployment details change.
  # For production, use their official deployment instructions.
  # ==========================================================
  posthog_db:
    image: postgres:15
    container_name: posthog_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: posthog
      POSTGRES_USER: posthog
      POSTGRES_PASSWORD: posthog_password_change_me
    volumes:
      - posthog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posthog -d posthog"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - company_net

  posthog_redis:
    image: redis:7-alpine
    container_name: posthog_redis
    restart: unless-stopped
    volumes:
      - posthog_redis_data:/data
    networks:
      - company_net

  posthog_clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: posthog_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: posthog
      CLICKHOUSE_USER: posthog
      CLICKHOUSE_PASSWORD: posthog_password_change_me
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - posthog_clickhouse_data:/var/lib/clickhouse
    networks:
      - company_net

  posthog:
    image: posthog/posthog:latest
    container_name: posthog
    restart: unless-stopped
    depends_on:
      posthog_db:
        condition: service_healthy
      posthog_redis:
        condition: service_started
      posthog_clickhouse:
        condition: service_started
    environment:
      SECRET_KEY: replace_with_long_random_posthog_secret
      SITE_URL: http://posthog.localhost
      DATABASE_URL: postgres://posthog:posthog_password_change_me@posthog_db:5432/posthog
      REDIS_URL: redis://posthog_redis:6379
      CLICKHOUSE_HOST: posthog_clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_USER: posthog
      CLICKHOUSE_PASSWORD: posthog_password_change_me
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_VERIFY: "false"
      DISABLE_SECURE_SSL_REDIRECT: "true"
      IS_BEHIND_PROXY: "true"
      OBJECT_STORAGE_ENABLED: "false"
    volumes:
      - posthog_data:/var/lib/posthog
    labels:
      - traefik.enable=true
      - traefik.http.routers.posthog.rule=Host(`posthog.localhost`)
      - traefik.http.routers.posthog.entrypoints=web
      - traefik.http.services.posthog.loadbalancer.server.port=8000
    networks:
      - company_net

  # ==========================================================
  # MATTERMOST - INTERNAL CHAT / ALERTS / INCIDENT CHANNELS
  # URL: http://chat.localhost
  # ==========================================================
  mattermost_db:
    image: postgres:15
    container_name: mattermost_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mattermost
      POSTGRES_USER: mattermost
      POSTGRES_PASSWORD: mattermost_password_change_me
    volumes:
      - mattermost_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mattermost -d mattermost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - company_net

  mattermost:
    image: mattermost/mattermost-team-edition:latest
    container_name: mattermost
    restart: unless-stopped
    depends_on:
      mattermost_db:
        condition: service_healthy
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mattermost:mattermost_password_change_me@mattermost_db:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: http://chat.localhost
      MM_SERVICESETTINGS_LISTENADDRESS: :8065
      MM_PLUGINSETTINGS_ENABLEUPLOADS: "true"
    volumes:
      - mattermost_config:/mattermost/config
      - mattermost_data:/mattermost/data
      - mattermost_logs:/mattermost/logs
      - mattermost_plugins:/mattermost/plugins
      - mattermost_client_plugins:/mattermost/client/plugins
      - mattermost_bleve_indexes:/mattermost/bleve-indexes
    labels:
      - traefik.enable=true
      - traefik.http.routers.mattermost.rule=Host(`chat.localhost`)
      - traefik.http.routers.mattermost.entrypoints=web
      - traefik.http.services.mattermost.loadbalancer.server.port=8065
    networks:
      - company_net

  # ==========================================================
  # MAILPIT - LOCAL EMAIL TESTING
  # UI: http://mail.localhost
  # SMTP internal: mailpit:1025
  # ==========================================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.mailpit.rule=Host(`mail.localhost`)
      - traefik.http.routers.mailpit.entrypoints=web
      - traefik.http.services.mailpit.loadbalancer.server.port=8025
    networks:
      - company_net
