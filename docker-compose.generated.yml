version: "3.9"

networks:
  af-iclme:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  grafana_data:
  prometheus_data:
  ollama_data:
  airbyte_data:
  prefect_data:
  keycloak_data:
  airbyte_db_data:
  airbyte_workspace:


services:

  # -------------------------------
  # Core Database
  # -------------------------------
  postgres:
    image: postgres:15
    container_name: postgres
    volumes:
      - ./docker/services/postgres/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d servicegen" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks: [ af-iclme ]
    env_file:
      - .af-iclme/vendor/postgres/.env

  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:

      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      # Define HTTPS entrypoint
      - "--entrypoints.websecure.address=:443"
      # Enable TLS
      #- "--entrypoints.websecure.http.tls=true"
      #- "--entrypoints.websecure.http.tls.certificates[0].certFile=/certs/_wildcard.servicegen.local.pem"
      #- "--entrypoints.websecure.http.tls.certificates[0].keyFile=/certs/_wildcard.servicegen.local-key.pem"

    ports:
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker/services/traefik/dynamic.yml:/etc/traefik/dynamic.yml
      - ./af-iclme/certs:/certs
    networks: [ af-iclme ]
    # -------------------------------
    # Control Plane
    # -------------------------------
    # service-gen-control-plane:
    #   build:
    #     context: ./app/micro-apps/control_plane/
    #     dockerfile: Dockerfile
    #   depends_on:
    #     postgres:
    #       condition: service_healthy
    #   command: [ "sleep", "infinity" ]
    #   env_file:
    #     - ./vendor/service-gen-control-plane/.env
    #   #command: upgrade head

    # -------------------------------
    # Backend API
    # -------------------------------
  af-iclme-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: service-gen-api
    env_file:
      - .env.local
    working_dir: /app
    volumes:
      - ./app/ingress/api/:/app/
      - ./capabilities:/app/capabilities/
      - ./data:/app/data/
    depends_on:
      - postgres
      - qdrant
      - ollama
      - prefect
    # ports:
    #   - "8000:8000"
    networks: [ af-iclme ]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.servicegenapi.rule=Host(`api.af-iclme.local`)"
      - "traefik.http.routers.servicegenapi.entrypoints=websecure"
      - "traefik.http.routers.servicegenapi.tls=true"
      - "traefik.http.services.servicegenapi.loadbalancer.server.port=8000"
